name: Unit Tests


on:
  push:
    branches:
    - '*'

  pull_request:

jobs:
  linux:
    name: (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest']
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra test --extra docs
      - name: Run tests
        run: uv run pytest --nbmake --cov=chainladder --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
  linux-pandas3:
    name: (${{ matrix.python-version }}, pandas3, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ 'ubuntu-latest' ]
        python-version: [ '3.14' ]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra test
      - name: Run tests
        run: uv run --with "pandas>=3,<=3.0.3" pytest --nbmake --cov=chainladder --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
  doctest:
    name: Doctest (ubuntu-latest, 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra docs
      - name: Generate autosummary stubs
        # sphinx-build decides which documents the doctest builder will test
        # *before* the autosummary extension has generated library/generated/*.rst
        # (those files are gitignored, so they don't exist on a fresh checkout).
        # Without this, every class/method docstring page is silently skipped.
        run: uv run --directory docs sphinx-autogen -o library/generated library/api.md
      - name: Run doctests
        run: uv run --directory docs sphinx-build -b doctest . _build/doctest
