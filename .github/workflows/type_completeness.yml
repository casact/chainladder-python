name: Pyright Type Completeness

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  typecompleteness:
    name: pyright --verifytypes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run pyright --verifytypes on PR head
        run: |
          uv run pyright --outputjson --verifytypes chainladder > head.json || true
          uv run pyright --verifytypes chainladder > head.txt || true
          bash .github/scripts/type_completeness_output.sh head.txt "PR head"

      - name: Run pyright --verifytypes on PR base
        run: |
          git fetch origin ${{ github.event.pull_request.base.sha }}
          git checkout ${{ github.event.pull_request.base.sha }} -- chainladder
          uv run pyright --outputjson --verifytypes chainladder > base.json || true
          uv run pyright --verifytypes chainladder > base.txt || true
          git checkout ${{ github.event.pull_request.head.sha }} -- chainladder
          bash .github/scripts/type_completeness_output.sh base.txt "PR base"

      - name: Build summary
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          uv run python .github/scripts/type_completeness.py \
            --base base.json \
            --head head.json \
            --run-url "$RUN_URL" \
            --output summary.md

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pyright-typecompleteness
          path: summary.md
