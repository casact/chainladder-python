version: 2

sphinx:
  configuration: docs/conf.py

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.11"
  jobs:
    pre_build:
      - "jupyter-book config sphinx docs/"
      - "python docs/prep_sphinx_conf.py"

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs